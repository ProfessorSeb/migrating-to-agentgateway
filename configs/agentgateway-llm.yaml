# AgentGateway OSS - LLM Gateway Configuration
# Equivalent to the LiteLLM config with OpenAI + Anthropic

llm:
  models:
    # --- OpenAI Models ---
    - name: gpt-4o
      provider: openAI
      params:
        model: gpt-4o
        apiKey: "$OPENAI_API_KEY"

    - name: gpt-4o-mini
      provider: openAI
      params:
        model: gpt-4o-mini
        apiKey: "$OPENAI_API_KEY"

    - name: gpt-3.5-turbo
      provider: openAI
      params:
        model: gpt-3.5-turbo
        apiKey: "$OPENAI_API_KEY"

    # --- Anthropic Models ---
    - name: claude-sonnet
      provider: anthropic
      params:
        model: claude-sonnet-4-20250514
        apiKey: "$ANTHROPIC_API_KEY"

    - name: claude-haiku
      provider: anthropic
      params:
        model: claude-haiku-4-5-20251001
        apiKey: "$ANTHROPIC_API_KEY"
